<svg xmlns="http://www.w3.org/2000/svg" width="1180" height="360" viewBox="0 0 1180 360" role="img" aria-labelledby="title desc">
<title id="title">01-boris-feedback-loop.svg</title>
<desc id="desc">Source Mermaid from How I Use Claude Code, Feedback During Implementation: Claude implements -&gt; I review/test -&gt; Correct? -&gt; Terse correction loop or Done.</desc>
<style>
  .bg { fill: #f8fafc; }
  .box { fill: #ffffff; stroke: #334155; stroke-width: 2; rx: 14; }
  .box-green { fill: #dcfce7; stroke: #22c55e; stroke-width: 2; rx: 14; }
  .box-red { fill: #fee2e2; stroke: #ef4444; stroke-width: 2; rx: 14; }
  .box-purple { fill: #ede9fe; stroke: #8b5cf6; stroke-width: 2; rx: 14; }
  .diamond { fill: #ffffff; stroke: #334155; stroke-width: 2; }
  .label { font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; font-size: 18px; fill: #0f172a; font-weight: 650; }
  .small { font-size: 15px; fill: #475569; font-weight: 600; }
  .edge { stroke: #334155; stroke-width: 2.2; fill: none; marker-end: url(#arrow); }
  .edge-red { stroke: #ef4444; stroke-width: 2.2; fill: none; marker-end: url(#arrow-red); }
  .edge-green { stroke: #16a34a; stroke-width: 2.2; fill: none; marker-end: url(#arrow-green); }
</style>
<defs>
  <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth"><path d="M0,0 L0,6 L9,3 z" fill="#334155" /></marker>
  <marker id="arrow-red" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth"><path d="M0,0 L0,6 L9,3 z" fill="#ef4444" /></marker>
  <marker id="arrow-green" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth"><path d="M0,0 L0,6 L9,3 z" fill="#16a34a" /></marker>
</defs>
<rect class="bg" x="0" y="0" width="1180" height="360" />
<rect class="box" x="80" y="60" width="190" height="70" rx="14" />
<text class="label" x="175.0" y="89.0" text-anchor="middle" dominant-baseline="middle">Claude</text>
<text class="label" x="175.0" y="112.0" text-anchor="middle" dominant-baseline="middle">implements</text>
<rect class="box" x="355" y="60" width="160" height="70" rx="14" />
<text class="label" x="435.0" y="89.0" text-anchor="middle" dominant-baseline="middle">I review</text>
<text class="label" x="435.0" y="112.0" text-anchor="middle" dominant-baseline="middle">/ test</text>
<polygon class="diamond" points="615,45.0 690.0,95 615,145.0 540.0,95" />
<text class="label" x="615" y="95" text-anchor="middle" dominant-baseline="middle">Correct?</text>
<rect class="box-red" x="530" y="245" width="170" height="70" rx="14" />
<text class="label" x="615.0" y="274.0" text-anchor="middle" dominant-baseline="middle">Terse</text>
<text class="label" x="615.0" y="297.0" text-anchor="middle" dominant-baseline="middle">correction</text>
<polygon class="diamond" points="830,45.0 910.0,95 830,145.0 750.0,95" />
<text class="label" x="830" y="95" text-anchor="middle" dominant-baseline="middle">More tasks?</text>
<rect class="box-green" x="980" y="60" width="140" height="70" rx="14" />
<text class="label" x="1050.0" y="95.0" text-anchor="middle" dominant-baseline="middle">Done</text>
<path class="edge" d="M270,95 L355,95" />
<path class="edge" d="M515,95 L540,95" />
<path class="edge-red" d="M615,145 L615,245" />
<text class="small" x="635" y="195" text-anchor="middle">No</text>
<path class="edge-red" d="M530,280 L170,280" />
<path class="edge-red" d="M170,280 L170,130" />
<path class="edge-green" d="M690,95 L750,95" />
<text class="small" x="720" y="80" text-anchor="middle">Yes</text>
<path class="edge-green" d="M910,95 L980,95" />
<text class="small" x="945" y="80" text-anchor="middle">No</text>
<path class="edge-green" d="M830,45 L830,30" />
<text class="small" x="850" y="35" text-anchor="middle">Yes</text>
<path class="edge-green" d="M830,30 L175,30" />
<path class="edge-green" d="M175,30 L175,60" />

</svg>