<svg xmlns="http://www.w3.org/2000/svg" width="1160" height="380" viewBox="0 0 1160 380" role="img" aria-labelledby="title desc">
<title id="title">01-boris-agentic-lifecycle.svg</title>
<desc id="desc">Source Mermaid from The Software Development Lifecycle Is Dead: Intent -&gt; Agent -&gt; Code + Tests + Deployment -&gt; Does it work? -&gt; loop or Ship.</desc>
<style>
  .bg { fill: #f8fafc; }
  .box { fill: #ffffff; stroke: #334155; stroke-width: 2; rx: 14; }
  .box-green { fill: #dcfce7; stroke: #22c55e; stroke-width: 2; rx: 14; }
  .box-red { fill: #fee2e2; stroke: #ef4444; stroke-width: 2; rx: 14; }
  .box-purple { fill: #ede9fe; stroke: #8b5cf6; stroke-width: 2; rx: 14; }
  .diamond { fill: #ffffff; stroke: #334155; stroke-width: 2; }
  .label { font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; font-size: 18px; fill: #0f172a; font-weight: 650; }
  .small { font-size: 15px; fill: #475569; font-weight: 600; }
  .edge { stroke: #334155; stroke-width: 2.2; fill: none; marker-end: url(#arrow); }
  .edge-red { stroke: #ef4444; stroke-width: 2.2; fill: none; marker-end: url(#arrow-red); }
  .edge-green { stroke: #16a34a; stroke-width: 2.2; fill: none; marker-end: url(#arrow-green); }
</style>
<defs>
  <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth"><path d="M0,0 L0,6 L9,3 z" fill="#334155" /></marker>
  <marker id="arrow-red" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth"><path d="M0,0 L0,6 L9,3 z" fill="#ef4444" /></marker>
  <marker id="arrow-green" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth"><path d="M0,0 L0,6 L9,3 z" fill="#16a34a" /></marker>
</defs>
<rect class="bg" x="0" y="0" width="1160" height="380" />
<rect class="box" x="85" y="65" width="150" height="70" rx="14" />
<text class="label" x="160.0" y="100.0" text-anchor="middle" dominant-baseline="middle">Intent</text>
<rect class="box" x="315" y="65" width="150" height="70" rx="14" />
<text class="label" x="390.0" y="100.0" text-anchor="middle" dominant-baseline="middle">Agent</text>
<rect class="box" x="540" y="55" width="230" height="90" rx="14" />
<text class="label" x="655.0" y="94.0" text-anchor="middle" dominant-baseline="middle">Code + Tests</text>
<text class="label" x="655.0" y="117.0" text-anchor="middle" dominant-baseline="middle">+ Deployment</text>
<polygon class="diamond" points="900,42.5 985.0,100 900,157.5 815.0,100" />
<text class="label" x="900" y="100" text-anchor="middle" dominant-baseline="middle">Does it work?</text>
<rect class="box-green" x="990" y="255" width="120" height="70" rx="14" />
<text class="label" x="1050.0" y="290.0" text-anchor="middle" dominant-baseline="middle">Ship</text>
<path class="edge" d="M235,100 L315,100" />
<path class="edge" d="M465,100 L540,100" />
<path class="edge" d="M770,100 L815,100" />
<path class="edge-red" d="M900,157 L900,255" />
<text class="small" x="930" y="205" text-anchor="middle">No</text>
<path class="edge-red" d="M900,255 L390,255" />
<path class="edge-red" d="M390,255 L390,135" />
<path class="edge-green" d="M960,145 L1020,255" />
<text class="small" x="1015" y="190" text-anchor="middle">Yes</text>

</svg>