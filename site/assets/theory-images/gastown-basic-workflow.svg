<svg xmlns="http://www.w3.org/2000/svg" width="1320" height="520" viewBox="0 0 1320 520" role="img" aria-labelledby="title desc">
  <title id="title">Gas Town basic workflow: user, Mayor, Convoy, agent and hooks</title>
  <desc id="desc">Local redraw based on the Gas Town README basic workflow mermaid diagram.</desc>
  <defs>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto" markerUnits="strokeWidth"><path d="M2,2 L10,6 L2,10 Z" fill="#334155"/></marker>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="3" stdDeviation="5" flood-color="#0f172a" flood-opacity="0.12"/></filter>
    <style>
      text { font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill:#0f172a; }
      .title { font-size: 30px; font-weight:760; }
      .subtitle { font-size:16px; fill:#475569; }
      .box { fill:#fff; stroke:#cbd5e1; stroke-width:2; rx:18; filter:url(#shadow); }
      .a { fill:#ede9fe; stroke:#7c3aed; }
      .b { fill:#e0f2fe; stroke:#0284c7; }
      .c { fill:#dcfce7; stroke:#16a34a; }
      .d { fill:#fef3c7; stroke:#d97706; }
      .label { font-size:20px; font-weight:700; }
      .small { font-size:14px; fill:#475569; }
      .line { stroke:#334155; stroke-width:3; fill:none; marker-end:url(#arrow); }
      .stage { font-size:13px; fill:#64748b; font-weight:650; }
    </style>
  </defs>
  <rect width="1320" height="520" fill="#ffffff"/>
  <text class="title" x="54" y="58">Gas Town: базовая петля выполнения задачи</text>
  <text class="subtitle" x="54" y="86">Задача проходит через Mayor и Convoy к агенту, затем hook фиксирует завершение и возвращает состояние наверх.</text>

  <rect class="box" x="70" y="188" width="170" height="94" rx="18"/>
  <text class="label" x="155" y="226" text-anchor="middle">You</text>
  <text class="small" x="155" y="253" text-anchor="middle">задаёте работу</text>

  <rect class="box a" x="310" y="188" width="180" height="94" rx="18"/>
  <text class="label" x="400" y="226" text-anchor="middle">Mayor</text>
  <text class="small" x="400" y="253" text-anchor="middle">координация</text>

  <rect class="box b" x="560" y="188" width="190" height="94" rx="18"/>
  <text class="label" x="655" y="226" text-anchor="middle">Convoy</text>
  <text class="small" x="655" y="253" text-anchor="middle">диспетчеризация</text>

  <rect class="box d" x="820" y="188" width="190" height="94" rx="18"/>
  <text class="label" x="915" y="226" text-anchor="middle">Agent</text>
  <text class="small" x="915" y="253" text-anchor="middle">исполнитель</text>

  <rect class="box c" x="1080" y="188" width="170" height="94" rx="18"/>
  <text class="label" x="1165" y="226" text-anchor="middle">Hook</text>
  <text class="small" x="1165" y="253" text-anchor="middle">завершение</text>

  <path class="line" d="M240 235 L310 235"/>
  <text class="stage" x="275" y="219" text-anchor="middle">1. task</text>

  <path class="line" d="M490 235 L560 235"/>
  <text class="stage" x="525" y="219" text-anchor="middle">2. spawn</text>

  <path class="line" d="M750 235 L820 235"/>
  <text class="stage" x="785" y="219" text-anchor="middle">3. dispatch</text>

  <path class="line" d="M1010 235 L1080 235"/>
  <text class="stage" x="1045" y="219" text-anchor="middle">4. complete</text>

  <path class="line" d="M1165 282 C1165 392, 655 392, 655 282"/>
  <text class="stage" x="910" y="381" text-anchor="middle">5. notify Convoy / update status</text>

  <path class="line" d="M655 188 C655 126, 400 126, 400 188"/>
  <text class="stage" x="528" y="119" text-anchor="middle">6. report progress</text>

  <path class="line" d="M400 188 C400 100, 155 100, 155 188"/>
  <text class="stage" x="276" y="94" text-anchor="middle">7. return state / decision</text>
</svg>
