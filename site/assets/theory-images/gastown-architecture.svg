<svg xmlns="http://www.w3.org/2000/svg" width="1320" height="760" viewBox="0 0 1320 760" role="img" aria-labelledby="title desc">
  <title id="title">Gas Town architecture: Mayor, town workspace, rigs, crew, hooks and worker agents</title>
  <desc id="desc">Local redraw based on the Gas Town README architecture mermaid diagram.</desc>
  <defs>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto" markerUnits="strokeWidth">
      <path d="M2,2 L10,6 L2,10 Z" fill="#334155"/>
    </marker>
    <marker id="dashArrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto" markerUnits="strokeWidth">
      <path d="M2,2 L10,6 L2,10 Z" fill="#64748b"/>
    </marker>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="3" stdDeviation="5" flood-color="#0f172a" flood-opacity="0.12"/>
    </filter>
    <style>
      text { font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill:#0f172a; }
      .title { font-size: 30px; font-weight: 760; }
      .subtitle { font-size: 16px; fill:#475569; }
      .box { fill:#fff; stroke:#cbd5e1; stroke-width:2; rx:18; filter:url(#shadow); }
      .box-blue { fill:#e0f2fe; stroke:#0284c7; }
      .box-violet { fill:#ede9fe; stroke:#7c3aed; }
      .box-green { fill:#dcfce7; stroke:#16a34a; }
      .box-amber { fill:#fef3c7; stroke:#d97706; }
      .label { font-size: 20px; font-weight:700; }
      .small { font-size: 14px; fill:#475569; }
      .tiny { font-size: 12px; fill:#64748b; }
      .line { stroke:#334155; stroke-width:3; fill:none; marker-end:url(#arrow); }
      .dash { stroke:#64748b; stroke-width:3; fill:none; stroke-dasharray:8 8; marker-end:url(#dashArrow); }
      .group { fill:#f8fafc; stroke:#e2e8f0; stroke-width:2; rx:22; }
    </style>
  </defs>
  <rect width="1320" height="760" fill="#ffffff"/>
  <text class="title" x="54" y="58">Gas Town: агентская организация вокруг рабочих областей</text>
  <text class="subtitle" x="54" y="86">Mayor координирует town workspace, rigs, crew, hooks и worker agents; worktrees связывают rig с Git-репозиторием.</text>

  <rect class="box box-violet" x="545" y="118" width="230" height="94" rx="18"/>
  <text class="label" x="660" y="157" text-anchor="middle">The Mayor</text>
  <text class="small" x="660" y="184" text-anchor="middle">AI coordinator</text>

  <rect class="box box-blue" x="500" y="268" width="320" height="96" rx="18"/>
  <text class="label" x="660" y="307" text-anchor="middle">Town Workspace</text>
  <text class="small" x="660" y="334" text-anchor="middle">~/gt/ — общее пространство Gas Town</text>

  <path class="line" d="M660 212 C660 232, 660 246, 660 268"/>

  <rect class="group" x="64" y="430" width="548" height="250" rx="22"/>
  <text class="label" x="100" y="472">Rig: Project A</text>
  <text class="small" x="100" y="499">изолированная проектная рабочая зона</text>

  <rect class="group" x="708" y="430" width="548" height="250" rx="22"/>
  <text class="label" x="744" y="472">Rig: Project B</text>
  <text class="small" x="744" y="499">ещё одна рабочая зона</text>

  <path class="line" d="M570 364 C430 400, 350 418, 260 430"/>
  <path class="line" d="M750 364 C890 400, 970 418, 1060 430"/>

  <rect class="box" x="94" y="530" width="146" height="84" rx="16"/>
  <text class="label" x="167" y="563" text-anchor="middle">Crew</text>
  <text class="small" x="167" y="590" text-anchor="middle">ваш workspace</text>

  <rect class="box box-green" x="262" y="530" width="146" height="84" rx="16"/>
  <text class="label" x="335" y="563" text-anchor="middle">Hooks</text>
  <text class="small" x="335" y="590" text-anchor="middle">persistent storage</text>

  <rect class="box box-amber" x="430" y="530" width="146" height="84" rx="16"/>
  <text class="label" x="503" y="563" text-anchor="middle">Polecats</text>
  <text class="small" x="503" y="590" text-anchor="middle">worker agents</text>

  <rect class="box" x="738" y="530" width="146" height="84" rx="16"/>
  <text class="label" x="811" y="563" text-anchor="middle">Crew</text>
  <text class="small" x="811" y="590" text-anchor="middle">workspace</text>

  <rect class="box box-green" x="906" y="530" width="146" height="84" rx="16"/>
  <text class="label" x="979" y="563" text-anchor="middle">Hooks</text>
  <text class="small" x="979" y="590" text-anchor="middle">persistent storage</text>

  <rect class="box box-amber" x="1074" y="530" width="146" height="84" rx="16"/>
  <text class="label" x="1147" y="563" text-anchor="middle">Polecats</text>
  <text class="small" x="1147" y="590" text-anchor="middle">worker agents</text>

  <rect class="box" x="255" y="686" width="158" height="48" rx="14"/>
  <text class="small" x="334" y="715" text-anchor="middle">Git repository</text>
  <path class="dash" d="M335 614 L335 686"/>
  <text class="tiny" x="352" y="654">git worktree</text>

  <rect class="box" x="899" y="686" width="158" height="48" rx="14"/>
  <text class="small" x="978" y="715" text-anchor="middle">Git repository</text>
  <path class="dash" d="M979 614 L979 686"/>
  <text class="tiny" x="996" y="654">git worktree</text>
</svg>
