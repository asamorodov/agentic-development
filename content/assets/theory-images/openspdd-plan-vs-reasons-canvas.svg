<rect x="34" y="100" width="330" height="78" class="head"/>
<text x="48" y="125" class="h">Problem</text>
<rect x="364" y="100" width="390" height="78" class="head"/>
<text x="378" y="125" class="h">Typical Plan Documents</text>
<rect x="754" y="100" width="390" height="78" class="head"/>
<text x="768" y="125" class="h">REASONS Canvas</text>
<rect x="34" y="178" width="330" height="78" class="box"/>
<text x="48" y="203" class="c">Nature</text>
<rect x="364" y="178" width="390" height="78" class="box"/>
<text x="378" y="203" class="c">Task list</text>
<rect x="754" y="178" width="390" height="78" class="box"/>
<text x="768" y="203" class="c">Design contract</text>
<rect x="34" y="256" width="330" height="78" class="box"/>
<text x="48" y="281" class="c">Constraints</text>
<rect x="364" y="256" width="390" height="78" class="box"/>
<text x="378" y="281" class="c">None — AI improvises freely</text>
<rect x="754" y="256" width="390" height="78" class="box"/>
<text x="768" y="281" class="c">Explicit — Norms define how,</text>
<text x="768" y="301" class="c">Safeguards define what not to do</text>
<rect x="34" y="334" width="330" height="78" class="box"/>
<text x="48" y="359" class="c">Detail level</text>
<rect x="364" y="334" width="390" height="78" class="box"/>
