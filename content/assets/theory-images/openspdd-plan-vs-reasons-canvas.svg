<rect x="754" y="334" width="390" height="78" class="box"/>
<text x="768" y="359" class="c">Precise: method signatures,</text>
<text x="768" y="379" class="c">parameters, error handling, DI</text>
<text x="768" y="399" class="c">patterns</text>
<rect x="34" y="412" width="330" height="78" class="box"/>
<text x="48" y="437" class="c">Traceability</text>
<rect x="364" y="412" width="390" height="78" class="box"/>
<text x="378" y="437" class="c">Docs do not update with code</text>
<rect x="754" y="412" width="390" height="78" class="box"/>
<text x="768" y="437" class="c">/spdd-sync enables reverse sync</text>
<rect x="34" y="490" width="330" height="78" class="box"/>
<text x="48" y="515" class="c">Validation</text>
<rect x="364" y="490" width="390" height="78" class="box"/>
<text x="378" y="515" class="c">“done when complete”</text>
<rect x="754" y="490" width="390" height="78" class="box"/>
<text x="768" y="515" class="c">Exact error messages and HTTP status</text>
<text x="768" y="535" class="c">codes in Safeguards</text>
