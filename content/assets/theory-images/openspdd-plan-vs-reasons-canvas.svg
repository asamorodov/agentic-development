<svg xmlns="http://www.w3.org/2000/svg" width="1180" height="706" viewBox="0 0 1180 706">
<style>text{font-family:Arial,Helvetica,sans-serif;} .title{font-size:30px;font-weight:700;fill:#111} .sub{font-size:17px;fill:#555} .h{font-size:18px;font-weight:700;fill:#222} .c{font-size:17px;fill:#222} .small{font-size:15px;fill:#444} .box{fill:#fff;stroke:#d0d7de;stroke-width:1.2}.head{fill:#f6f8fa;stroke:#d0d7de;stroke-width:1.2}.accent{fill:#eef6ff;stroke:#8bb9e8;stroke-width:1.2}</style>
<rect x="0" y="0" width="1180" height="706" fill="#ffffff"/>
<text x="34" y="44" class="title">OpenSPDD: обычный план и REASONS Canvas</text>
