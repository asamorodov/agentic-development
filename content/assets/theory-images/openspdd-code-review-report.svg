<svg xmlns="http://www.w3.org/2000/svg" width="1180" height="748" viewBox="0 0 1180 748">
<style>text{font-family:Arial,Helvetica,sans-serif;} .title{font-size:30px;font-weight:700;fill:#111} .sub{font-size:17px;fill:#555} .h{font-size:18px;font-weight:700;fill:#222} .c{font-size:17px;fill:#222} .small{font-size:15px;fill:#444} .box{fill:#fff;stroke:#d0d7de;stroke-width:1.2}.head{fill:#f6f8fa;stroke:#d0d7de;stroke-width:1.2}.accent{fill:#eef6ff;stroke:#8bb9e8;stroke-width:1.2}</style>
<rect x="0" y="0" width="1180" height="748" fill="#ffffff"/>
<text x="34" y="44" class="title">OpenSPDD /spdd-code-review: что проверяет отчёт</text>
<text x="34" y="72" class="sub">Локальная визуальная выдержка по мотивам шаблона OpenSPDD /spdd-code-review</text>
<rect x="34" y="100" width="330" height="84" class="head"/>
<text x="48" y="125" class="h">Section</text>
<rect x="364" y="100" width="390" height="84" class="head"/>
<text x="378" y="125" class="h">Review focus</text>
<rect x="754" y="100" width="390" height="84" class="head"/>
<text x="768" y="125" class="h">Why it matters</text>
<rect x="34" y="184" width="330" height="84" class="box"/>
<text x="48" y="209" class="c">Requirements</text>
<rect x="364" y="184" width="390" height="84" class="box"/>
<text x="378" y="209" class="c">Does code solve the stated problem —</text>
<text x="378" y="229" class="c">no more, no less?</text>
<rect x="754" y="184" width="390" height="84" class="box"/>
<text x="768" y="209" class="c">Finds scope expansion or contraction</text>
<rect x="34" y="268" width="330" height="84" class="box"/>
<text x="48" y="293" class="c">Entities</text>
<rect x="364" y="268" width="390" height="84" class="box"/>
<text x="378" y="293" class="c">Do code entities match the defined</text>
<text x="378" y="313" class="c">model?</text>
<rect x="754" y="268" width="390" height="84" class="box"/>
<text x="768" y="293" class="c">Catches entity drift and unauthorized</text>
<text x="768" y="313" class="c">entities</text>
<rect x="34" y="352" width="330" height="84" class="box"/>
<text x="48" y="377" class="c">Approach</text>
<rect x="364" y="352" width="390" height="84" class="box"/>
<text x="378" y="377" class="c">Does implementation follow chosen</text>
<text x="378" y="397" class="c">strategies?</text>
<rect x="754" y="352" width="390" height="84" class="box"/>
<text x="768" y="377" class="c">Flags architectural choices not</text>
<text x="768" y="397" class="c">delegated to the agent</text>
<rect x="34" y="436" width="330" height="84" class="box"/>
<text x="48" y="461" class="c">Structure / Operations</text>
<rect x="364" y="436" width="390" height="84" class="box"/>
<text x="378" y="461" class="c">Do components, signatures and logic</text>
<text x="378" y="481" class="c">steps match the prompt?</text>
<rect x="754" y="436" width="390" height="84" class="box"/>
<text x="768" y="461" class="c">Checks whether code translated the</text>
<text x="768" y="481" class="c">Canvas faithfully</text>
<rect x="34" y="520" width="330" height="84" class="box"/>
<text x="48" y="545" class="c">Norms / Safeguards</text>
<rect x="364" y="520" width="390" height="84" class="box"/>
<text x="378" y="545" class="c">Are conventions followed and</text>
<text x="378" y="565" class="c">constraints respected?</text>
<rect x="754" y="520" width="390" height="84" class="box"/>
<text x="768" y="545" class="c">Safeguard violations are high-priority</text>
<text x="768" y="565" class="c">findings</text>
<rect x="34" y="604" width="330" height="84" class="box"/>
<text x="48" y="629" class="c">Intent drift</text>
<rect x="364" y="604" width="390" height="84" class="box"/>
<text x="378" y="629" class="c">Positive, negative and direction drift</text>
<rect x="754" y="604" width="390" height="84" class="box"/>
<text x="768" y="629" class="c">Shows where the code changed meaning,</text>
<text x="768" y="649" class="c">not just syntax</text>
</svg>