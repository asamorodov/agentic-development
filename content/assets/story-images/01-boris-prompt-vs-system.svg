<svg xmlns="http://www.w3.org/2000/svg" width="1020" height="360" viewBox="0 0 1020 360" role="img" aria-labelledby="title desc">
<title id="title">01-boris-prompt-vs-system.svg</title>
<desc id="desc">Source Mermaid from Slop Creep: Agent sees the prompt -&gt; builds solution -&gt; correct in isolation, wrong for the system.</desc>
<style>
  .bg { fill: #f8fafc; }
  .box { fill: #ffffff; stroke: #334155; stroke-width: 2; rx: 14; }
  .box-green { fill: #dcfce7; stroke: #22c55e; stroke-width: 2; rx: 14; }
  .box-red { fill: #fee2e2; stroke: #ef4444; stroke-width: 2; rx: 14; }
  .box-purple { fill: #ede9fe; stroke: #8b5cf6; stroke-width: 2; rx: 14; }
  .diamond { fill: #ffffff; stroke: #334155; stroke-width: 2; }
  .label { font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; font-size: 18px; fill: #0f172a; font-weight: 650; }
  .small { font-size: 15px; fill: #475569; font-weight: 600; }
  .edge { stroke: #334155; stroke-width: 2.2; fill: none; marker-end: url(#arrow); }
  .edge-red { stroke: #ef4444; stroke-width: 2.2; fill: none; marker-end: url(#arrow-red); }
  .edge-green { stroke: #16a34a; stroke-width: 2.2; fill: none; marker-end: url(#arrow-green); }
</style>
<defs>
  <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth"><path d="M0,0 L0,6 L9,3 z" fill="#334155" /></marker>
  <marker id="arrow-red" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth"><path d="M0,0 L0,6 L9,3 z" fill="#ef4444" /></marker>
  <marker id="arrow-green" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth"><path d="M0,0 L0,6 L9,3 z" fill="#16a34a" /></marker>
</defs>
<rect class="bg" x="0" y="0" width="1020" height="360" />
<rect class="box" x="80" y="120" width="220" height="80" rx="14" />
<text class="label" x="190.0" y="154.0" text-anchor="middle" dominant-baseline="middle">Agent sees:</text>
<text class="label" x="190.0" y="177.0" text-anchor="middle" dominant-baseline="middle">the prompt</text>
<rect class="box" x="395" y="120" width="220" height="80" rx="14" />
<text class="label" x="505.0" y="154.0" text-anchor="middle" dominant-baseline="middle">Agent builds:</text>
<text class="label" x="505.0" y="177.0" text-anchor="middle" dominant-baseline="middle">the solution</text>
<rect class="box-green" x="720" y="40" width="220" height="80" rx="14" />
<text class="label" x="830.0" y="74.0" text-anchor="middle" dominant-baseline="middle">Correct</text>
<text class="label" x="830.0" y="97.0" text-anchor="middle" dominant-baseline="middle">in isolation</text>
<rect class="box-red" x="720" y="220" width="220" height="80" rx="14" />
<text class="label" x="830.0" y="254.0" text-anchor="middle" dominant-baseline="middle">Wrong</text>
<text class="label" x="830.0" y="277.0" text-anchor="middle" dominant-baseline="middle">for the system</text>
<path class="edge" d="M300,160 L395,160" />
<path class="edge-green" d="M615,160 L720,80" />
<path class="edge-red" d="M615,160 L720,260" />

</svg>