<svg xmlns="http://www.w3.org/2000/svg" width="1000" height="520" viewBox="0 0 1000 520" role="img" aria-labelledby="title desc">
<title id="title">AWS ADR lifecycle: Proposed → Accepted / Rejected → Superseded</title>
<desc id="desc">Локальная визуальная выдержка по ADR process из AWS Prescriptive Guidance.</desc>
<rect x="0" y="0" width="1000" height="520" fill="#ffffff"/>
<rect x="24" y="24" width="952" height="472" rx="18" fill="#f9fafb" stroke="#374151" stroke-width="1.5"/>
<text x="54" y="70" font-size="26" font-weight="700" fill="#111827">AWS ADR lifecycle: Proposed → Accepted / Rejected → Superseded</text>
<text x="54" y="103" font-size="14" font-weight="normal" fill="#6b7280">Локальная визуальная выдержка по ADR process из AWS Prescriptive Guidance.</text>
<rect x="60" y="135" width="250" height="115" rx="14" fill="#fff" stroke="#374151" stroke-width="1"/>
<text x="78" y="169" font-size="17" font-weight="700" fill="#111827">Create</text>
<text x="78" y="199" font-size="13" font-weight="normal" fill="#374151">владелец готовит ADR</text>
<text x="78" y="217" font-size="13" font-weight="normal" fill="#374151">стартовое состояние: Proposed</text>
<rect x="375" y="135" width="250" height="115" rx="14" fill="#fff" stroke="#374151" stroke-width="1"/>
<text x="393" y="169" font-size="17" font-weight="700" fill="#111827">Review</text>
<text x="393" y="199" font-size="13" font-weight="normal" fill="#374151">команда читает и комментирует</text>
<text x="393" y="217" font-size="13" font-weight="normal" fill="#374151">решение: accept / rework / reject</text>
<rect x="690" y="135" width="250" height="115" rx="14" fill="#fff" stroke="#374151" stroke-width="1"/>
<text x="708" y="169" font-size="17" font-weight="700" fill="#111827">Accept / Reject</text>
<text x="708" y="199" font-size="13" font-weight="normal" fill="#374151">timestamp, version, stakeholders</text>
<text x="708" y="217" font-size="13" font-weight="normal" fill="#374151">или причина отказа</text>
<rect x="220" y="310" width="250" height="105" rx="14" fill="#fff" stroke="#374151" stroke-width="1"/>
<text x="238" y="344" font-size="17" font-weight="700" fill="#111827">Immutable accepted ADR</text>
<text x="238" y="374" font-size="13" font-weight="normal" fill="#374151">accepted не переписывается</text>
<text x="238" y="392" font-size="13" font-weight="normal" fill="#374151">новые знания требуют новый ADR</text>
<rect x="535" y="310" width="250" height="105" rx="14" fill="#fff" stroke="#374151" stroke-width="1"/>
<text x="553" y="344" font-size="17" font-weight="700" fill="#111827">New ADR supersedes old</text>
<text x="553" y="374" font-size="13" font-weight="normal" fill="#374151">новый review-process</text>
<text x="553" y="392" font-size="13" font-weight="normal" fill="#374151">старый ADR получает Superseded</text>
<line x1="54" y1="456" x2="946" y2="456" stroke="#e5e7eb" stroke-width="1"/>
<text x="54" y="484" font-size="12" font-weight="normal" fill="#6b7280">Источник: AWS Prescriptive Guidance, “ADR process”.</text>
</svg>