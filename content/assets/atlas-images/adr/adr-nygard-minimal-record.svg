<svg xmlns="http://www.w3.org/2000/svg" width="1000" height="520" viewBox="0 0 1000 520" role="img" aria-labelledby="title desc">
<title id="title">Nygard ADR: минимальная запись решения</title>
<desc id="desc">Локальная визуальная выдержка по “Documenting Architecture Decisions”.</desc>
<rect x="0" y="0" width="1000" height="520" fill="#ffffff"/>
<rect x="24" y="24" width="952" height="472" rx="18" fill="#f9fafb" stroke="#374151" stroke-width="1.5"/>
<text x="54" y="70" font-size="26" font-weight="700" fill="#111827">Nygard ADR: минимальная запись решения</text>
<text x="54" y="103" font-size="14" font-weight="normal" fill="#6b7280">Локальная визуальная выдержка по “Documenting Architecture Decisions”.</text>
<rect x="60" y="135" width="420" height="110" rx="14" fill="#fff" stroke="#374151" stroke-width="1"/>
<text x="78" y="169" font-size="17" font-weight="700" fill="#111827">Context</text>
<text x="78" y="199" font-size="13" font-weight="normal" fill="#374151">силы, ограничения, ситуация</text>
<text x="78" y="217" font-size="13" font-weight="normal" fill="#374151">технические, социальные, проектные факторы</text>
<rect x="520" y="135" width="420" height="110" rx="14" fill="#fff" stroke="#374151" stroke-width="1"/>
<text x="538" y="169" font-size="17" font-weight="700" fill="#111827">Decision</text>
<text x="538" y="199" font-size="13" font-weight="normal" fill="#374151">одно решение в ответ на эти силы</text>
<text x="538" y="217" font-size="13" font-weight="normal" fill="#374151">не список идей и не общий план</text>
<rect x="60" y="285" width="420" height="110" rx="14" fill="#fff" stroke="#374151" stroke-width="1"/>
<text x="78" y="319" font-size="17" font-weight="700" fill="#111827">Status</text>
<text x="78" y="349" font-size="13" font-weight="normal" fill="#374151">proposed / accepted / superseded</text>
<text x="78" y="367" font-size="13" font-weight="normal" fill="#374151">старое решение остаётся историческим следом</text>
<rect x="520" y="285" width="420" height="110" rx="14" fill="#fff" stroke="#374151" stroke-width="1"/>
<text x="538" y="319" font-size="17" font-weight="700" fill="#111827">Consequences</text>
<text x="538" y="349" font-size="13" font-weight="normal" fill="#374151">новый контекст после решения</text>
<text x="538" y="367" font-size="13" font-weight="normal" fill="#374151">положительные, отрицательные и нейтральные последствия</text>
<line x1="54" y1="456" x2="946" y2="456" stroke="#e5e7eb" stroke-width="1"/>
<text x="54" y="484" font-size="12" font-weight="normal" fill="#6b7280">Источник: Michael Nygard, “Documenting Architecture Decisions”.</text>
</svg>